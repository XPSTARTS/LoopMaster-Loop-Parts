<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoopMaster</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 300px;
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      color: #e0e0e0;
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      padding: 20px;
      border-radius: 12px;
    }
    
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding-bottom: 12px;
    }
    
    .header h2 {
      font-size: 18px;
      color: #fff;
      font-weight: 700;
    }
    
    .header h2 span {
      color: #FF6B6B;
    }
    
    .badge {
      font-size: 10px;
      background: rgba(255,107,107,0.2);
      color: #FF6B6B;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255,107,107,0.3);
      font-weight: 600;
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    
    .status-dot.hidden {
      background: #666;
    }
    
    .status-dot.visible {
      background: #4ECDC4;
      box-shadow: 0 0 12px rgba(78,205,196,0.4);
    }
    
    .status-dot.looping {
      background: #FF6B6B;
      animation: pulse 1s infinite;
      box-shadow: 0 0 16px rgba(255,107,107,0.5);
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }
    
    #statusText {
      font-size: 13px;
      font-weight: 500;
    }
    
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .btn {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }
    
    .btn:active {
      transform: scale(0.97);
    }
    
    .btn-show {
      background: linear-gradient(135deg, #4ECDC4, #44b8b0);
      color: #fff;
      box-shadow: 0 4px 16px rgba(78,205,196,0.3);
    }
    
    .btn-show:hover {
      box-shadow: 0 6px 24px rgba(78,205,196,0.4);
    }
    
    .btn-hide {
      background: linear-gradient(135deg, #FF6B6B, #e55a5a);
      color: #fff;
      box-shadow: 0 4px 16px rgba(255,107,107,0.3);
    }
    
    .btn-hide:hover {
      box-shadow: 0 6px 24px rgba(255,107,107,0.4);
    }
    
    .btn-shortcuts {
      background: rgba(255,255,255,0.05);
      color: #aaa;
      font-size: 12px;
      cursor: default;
      border: 1px solid rgba(255,255,255,0.06);
      flex-direction: column;
      padding: 14px;
    }
    
    .btn-shortcuts:hover {
      transform: none;
      filter: none;
    }
    
    .shortcut-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 16px;
      margin-top: 8px;
      width: 100%;
      font-size: 11px;
      color: #888;
    }
    
    .shortcut-grid span {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
    }
    
    .shortcut-grid span:hover {
      color: #ccc;
    }
    
    .key {
      background: rgba(255,255,255,0.06);
      padding: 0 8px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      color: #aaa;
      font-size: 10px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    .footer {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px;
      color: #555;
      text-align: center;
      letter-spacing: 0.5px;
    }
    
    .footer span {
      color: #FF6B6B;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>🔄 Loop<span>Master</span></h2>
    <span class="badge">v1.0.1</span>
  </div>

  <div class="status" id="statusDisplay">
    <span class="status-dot hidden" id="statusDot"></span>
    <span id="statusText">Checking...</span>
  </div>

  <div class="btn-group">
    <button class="btn btn-show" id="showBtn">👁️ Show LoopMaster</button>
    <button class="btn btn-hide" id="hideBtn">✕ Hide LoopMaster</button>
    <button class="btn btn-shortcuts">
      ⌨️ Keyboard Shortcuts
      <div class="shortcut-grid">
        <span>Set A <span class="key">Ctrl+Shift+1</span></span>
        <span>Set B <span class="key">Ctrl+Shift+2</span></span>
        <span>Toggle Loop <span class="key">Ctrl+Shift+3</span></span>
        <span>Clear Loop <span class="key">Ctrl+Shift+4</span></span>
        <span style="grid-column: span 2; justify-content: center; gap: 8px;">
          Show/Hide <span class="key">Ctrl+Shift+H</span>
        </span>
      </div>
    </button>
  </div>

  <div class="footer">
    Made with <span>❤️</span> • Keyboard friendly
  </div>

  <script src="dist/popup.js"></script>
</body>
</html>
