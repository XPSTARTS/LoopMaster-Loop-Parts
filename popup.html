<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoopMaster</title>
  <style>
    /* ===== RESET & BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      background: #ffffff;
      color: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      padding: 24px 20px 20px;
      border-radius: 0;
      line-height: 1.5;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #0f0f1a;
        color: #e8e8f0;
      }
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      font-size: 24px;
      line-height: 1;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-text .highlight {
      background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      background: rgba(255, 107, 107, 0.12);
      color: #FF6B6B;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.3px;
      border: 1px solid rgba(255, 107, 107, 0.15);
    }

    @media (prefers-color-scheme: dark) {
      .badge {
        background: rgba(255, 107, 107, 0.18);
        border-color: rgba(255, 107, 107, 0.2);
      }
    }

    /* ===== STATUS CARD ===== */
    .status-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: rgba(0, 0, 0, 0.04);
      border-radius: 14px;
      margin-bottom: 18px;
      border: 1px solid rgba(0, 0, 0, 0.05);
      transition: all 0.3s ease;
    }

    @media (prefers-color-scheme: dark) {
      .status-card {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.06);
      }
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .status-dot.hidden {
      background: #888;
    }

    .status-dot.visible {
      background: #4ECDC4;
      box-shadow: 0 0 16px rgba(78, 205, 196, 0.35);
    }

    .status-dot.looping {
      background: #FF6B6B;
      animation: pulse 1s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(255, 107, 107, 0.4);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    .status-text {
      font-size: 13px;
      font-weight: 500;
      flex: 1;
      color: #1a1a2e;
    }

    @media (prefers-color-scheme: dark) {
      .status-text {
        color: #c8c8d8;
      }
    }

    .status-text .dim {
      font-weight: 400;
      color: #888;
    }

    @media (prefers-color-scheme: dark) {
      .status-text .dim {
        color: #666;
      }
    }

    /* ===== BUTTONS ===== */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 4px;
    }

    .btn {
      padding: 13px 20px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: inherit;
      letter-spacing: 0.2px;
      text-decoration: none;
    }

    .btn:active {
      transform: scale(0.97);
    }

    /* Show Button */
    .btn-show {
      background: linear-gradient(135deg, #4ECDC4 0%, #3db8b0 100%);
      color: #fff;
      box-shadow: 0 4px 16px rgba(78, 205, 196, 0.3);
    }

    .btn-show:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(78, 205, 196, 0.4);
    }

    .btn-show:active {
      transform: scale(0.97);
    }

    .btn-show.active {
      background: #2d8f88;
      box-shadow: none;
      opacity: 0.6;
      cursor: default;
    }

    .btn-show.active:hover {
      transform: none;
      box-shadow: none;
    }

    /* Hide Button */
    .btn-hide {
      background: linear-gradient(135deg, #FF6B6B 0%, #e55a5a 100%);
      color: #fff;
      box-shadow: 0 4px 16px rgba(255, 107, 107, 0.3);
    }

    .btn-hide:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(255, 107, 107, 0.4);
    }

    .btn-hide:active {
      transform: scale(0.97);
    }

    .btn-hide.active {
      background: #a84444;
      box-shadow: none;
      opacity: 0.6;
      cursor: default;
    }

    .btn-hide.active:hover {
      transform: none;
      box-shadow: none;
    }

    /* Icon inside buttons */
    .btn-icon {
      font-size: 16px;
      line-height: 1;
    }

    /* ===== SHORTCUTS REFERENCE ===== */
    .shortcuts-section {
      margin-top: 14px;
      padding: 14px 16px;
      background: rgba(0, 0, 0, 0.03);
      border-radius: 12px;
      border: 1px solid rgba(0, 0, 0, 0.04);
    }

    @media (prefers-color-scheme: dark) {
      .shortcuts-section {
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(255, 255, 255, 0.05);
      }
    }

    .shortcuts-title {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    @media (prefers-color-scheme: dark) {
      .shortcuts-title {
        color: #666;
      }
    }

    .shortcut-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 16px;
      font-size: 12px;
    }

    .shortcut-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      color: #666;
    }

    @media (prefers-color-scheme: dark) {
      .shortcut-item {
        color: #888;
      }
    }

    .shortcut-item .label {
      font-weight: 400;
    }

    .shortcut-item .key {
      font-family: 'SF Mono', 'Courier New', monospace;
      font-size: 10px;
      font-weight: 600;
      background: rgba(0, 0, 0, 0.06);
      padding: 2px 10px;
      border-radius: 4px;
      color: #555;
      border: 1px solid rgba(0, 0, 0, 0.05);
      letter-spacing: 0.3px;
    }

    @media (prefers-color-scheme: dark) {
      .shortcut-item .key {
        background: rgba(255, 255, 255, 0.08);
        color: #aaa;
        border-color: rgba(255, 255, 255, 0.06);
      }
    }

    /* ===== FOOTER ===== */
    .footer {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(0, 0, 0, 0.05);
      font-size: 11px;
      color: #aaa;
      text-align: center;
      letter-spacing: 0.3px;
    }

    @media (prefers-color-scheme: dark) {
      .footer {
        border-top-color: rgba(255, 255, 255, 0.05);
        color: #555;
      }
    }

    .footer .heart {
      color: #FF6B6B;
    }

    .footer .version {
      background: rgba(0, 0, 0, 0.04);
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 10px;
      color: #bbb;
    }

    @media (prefers-color-scheme: dark) {
      .footer .version {
        background: rgba(255, 255, 255, 0.06);
        color: #555;
      }
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <div class="header">
    <div class="logo">
      <span class="logo-icon">🔄</span>
      <span class="logo-text">Loop<span class="highlight">Master</span></span>
    </div>
    <span class="badge">v1.0.2</span>
  </div>

  <!-- ===== STATUS ===== -->
  <div class="status-card" id="statusDisplay">
    <span class="status-dot hidden" id="statusDot"></span>
    <span class="status-text" id="statusText">Checking...</span>
  </div>

  <!-- ===== BUTTONS ===== -->
  <div class="btn-group">
    <button class="btn btn-show" id="showBtn">
      <span class="btn-icon">👁️</span>
      <span id="showLabel">Show Control UI</span>
    </button>
    <button class="btn btn-hide" id="hideBtn">
      <span class="btn-icon">✕</span>
      Hide Control UI
    </button>
  </div>

  <!-- ===== SHORTCUTS ===== -->
  <div class="shortcuts-section">
    <div class="shortcuts-title">⚡ Quick Reference</div>
    <div class="shortcut-grid">
      <div class="shortcut-item">
        <span class="label">Set Start</span>
        <span class="key">Click A</span>
      </div>
      <div class="shortcut-item">
        <span class="label">Set End</span>
        <span class="key">Click B</span>
      </div>
      <div class="shortcut-item">
        <span class="label">Toggle Loop</span>
        <span class="key">Click ▶</span>
      </div>
      <div class="shortcut-item">
        <span class="label">Clear Points</span>
        <span class="key">Click ✕</span>
      </div>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <div class="footer">
    Made with <span class="heart">❤️</span> • UI auto-shows on video play
  </div>

  <script src="dist/popup.js"></script>
</body>
</html>
